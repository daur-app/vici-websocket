name: Continuous Deployment
on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug secrets
        run: |
          echo "Username length: ${#DOCKER_USER}"
          echo "Token length: ${#DOCKER_TOKEN}"
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: aniketjha4518/vicisocket:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Cleanup old docker data
        run: sudo docker system prune -f

      - name: Pull image from docker hub
        run: sudo docker pull aniketjha4518/vicisocket:latest

      - name: Force remove old container if exists
        run: sudo docker rm -f vicisocket-container || true

      - name: Start new container
        run: |
          sudo docker run -d \
            --name vicisocket-container \
            --restart unless-stopped \
            -p 3000:3000 \
            -e CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e REDIS_URL="${{ secrets.REDIS_URL }}" \
            -e SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            -e NODE_ENV="production" \
            aniketjha4518/vicisocket:latest
